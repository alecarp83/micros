<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microcontroladores · inicio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f7fc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e2b3c;
            line-height: 1.4;
        }

        .welcome-card {
            background: #ffffff;
            width: 100%;
            max-width: 680px;
            margin: 2rem;
            padding: 3.5rem 2.5rem;
            border-radius: 38px;
            box-shadow: 0 20px 35px -8px rgba(18, 35, 60, 0.08), 
                        0 4px 10px -2px rgba(0, 20, 40, 0.03);
            text-align: center;
            border: 1px solid rgba(27, 55, 96, 0.06);
            transition: transform 0.2s ease;
        }

        .brand {
            margin-bottom: 3.2rem;
        }

        .brand h1 {
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: #1b3760;
            background: linear-gradient(135deg, #1b3760 0%, #2a4b7a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.2rem;
            filter: drop-shadow(0 2px 4px rgba(22, 48, 85, 0.08));
        }

        .badge {
            display: inline-block;
            background: rgba(255, 143, 105, 0.12);
            color: #b45a2e;
            font-weight: 450;
            font-size: 0.95rem;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 143, 105, 0.25);
            margin-top: 0.25rem;
            letter-spacing: 0.3px;
        }

        .institution-tag {
            color: #5f6f82;
            font-size: 1.1rem;
            margin: 0.5rem 0 1.2rem 0;
            font-weight: 350;
            border-bottom: 1px solid rgba(27, 55, 96, 0.08);
            display: inline-block;
            padding-bottom: 0.4rem;
        }

        .ingresar-section {
            margin: 2.8rem 0 1.5rem 0;
        }

        /* BOTÓN REDIMENSIONADO: 50% más pequeño respecto a la versión anterior */
        .btn-unico {
            background: #1b3760;
            border: none;
            padding: 0.7rem 2.2rem;    /* reducido ~50% */
            border-radius: 60px;
            font-size: 1.2rem;          /* reducido ~50% */
            font-weight: 470;
            letter-spacing: 0.5px;
            color: white;
            cursor: pointer;
            box-shadow: 0 12px 22px -10px rgba(27, 55, 96, 0.35), 
                        0 4px 8px -2px rgba(255, 143, 105, 0.15);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(2px);
            line-height: 1.2;
            min-width: 160px;           /* ajustado al nuevo tamaño */
            display: inline-block;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-unico:hover {
            background: #23497a;
            transform: scale(1.01) translateY(-3px);
            box-shadow: 0 20px 28px -12px #1b3760b3, 0 6px 12px -6px #ff8f6950;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-unico:active {
            background: #123158;
            transform: scale(0.99) translateY(0);
            box-shadow: 0 8px 14px -6px #0d2642;
            transition: 0.05s;
        }

        .accent-line {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, #ffb08a, #ff8f69, #ffb08a);
            border-radius: 6px;
            margin: 2rem auto 0.2rem auto;
            opacity: 0.5;
        }

        .footer-note {
            color: #8c9aa8;
            font-size: 0.85rem;
            margin-top: 2.8rem;
            border-top: 1px solid rgba(27, 55, 96, 0.08);
            padding-top: 1.6rem;
            font-weight: 350;
            letter-spacing: 0.2px;
        }

        .footer-note span {
            color: #b45a2e;
            font-weight: 400;
        }

        .extra-links, .menu, .options {
            display: none;
        }

        @media (max-width: 480px) {
            .welcome-card {
                padding: 2.5rem 1.5rem;
                margin: 1rem;
                border-radius: 30px;
            }

            .brand h1 {
                font-size: 2.2rem;
            }

            .btn-unico {
                font-size: 1.1rem;
                padding: 0.6rem 1.8rem;
                min-width: 140px;
            }

            .badge {
                font-size: 0.8rem;
            }
        }

        a, a:hover, a:focus, a:visited {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <!-- Marca principal: Microcontroladores -->
        <div class="brand">
            <h1>Microcontroladores</h1>
            <div class="badge">ESP32 · ESP8266 · ARDUINO</div>
        </div>

        <!-- Subtítulo formal que refuerza la identidad -->
        <div class="institution-tag">·Estructuración de Proyectos de Electrónica para Estudiantes·</div>

        <!-- Bloque único de ingreso: solo el botón "Ingresar" -->
        <div class="ingresar-section">
            <button class="btn-unico" id="ingresarBtn">Ingresar</button>
        </div>

        <!-- línea decorativa con el naranja suave -->
        <div class="accent-line"></div>

        <!-- texto de contexto formal -->
        <div class="footer-note">
            <span>Microcontroladores UNM</span> · Entorno de Desarrollo Integrado con IA · <span>v.3.1</span>
        </div>
    </div>

    <script>
        (function() {
            const boton = document.getElementById('ingresarBtn');
            
            function abrirPortal() {
                // URL actualizada para el sitio de microcontroladores
                // En este caso usamos el mismo dominio como placeholder, 
                // pero podría modificarse a la URL real del proyecto
                window.location.href = 'https://www.unicaweb.com';
            }

            if (boton) {
                boton.addEventListener('click', abrirPortal);
            }

            boton.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    abrirPortal();
                }
            });
        })();
    </script>
</body>
</html>
